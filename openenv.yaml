id: ticket-routing-openenv
name: ticket-routing-env
description: AI environment for customer support ticket routing
version: 1.0

observation:
  type: object
  properties:
    ticket_text:
      type: string
    task_type:
      type: string

action:
  type: object
  properties:
    department:
      type: string
    priority:
      type: string
    escalation:
      type: string

reward:
  type: float


tasks:
  - id: route_easy_chargeback
    description: Route a duplicate-charge billing complaint
    grader:
      endpoint: /grader
      method: POST

  - id: route_easy_login
    description: Route a login/password complaint
    grader:
      endpoint: /grader
      method: POST

  - id: route_medium_buffering
    description: Route a technical performance complaint
    grader:
      endpoint: /grader
      method: POST

  - id: route_medium_email_update
    description: Route an email update complaint
    grader:
      endpoint: /grader
      method: POST

  - id: route_hard_account_change
    description: Route an account settings complaint
    grader:
      endpoint: /grader
      method: POST